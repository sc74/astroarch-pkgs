name: Build AArch64 Packages

on:
  push:
    branches:
      - main
      - workflows   # ← retirer cette ligne une fois les tests terminés
    paths:
      - 'packages/**/PKGBUILD'
      - 'packages/**/*.install'
      - 'packages/**/*.patch'
      - 'packages/**/src/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Nom du paquet à forcer (ex: indi-core), laisser vide pour détecter'
        required: false
        default: ''

jobs:
  # ─── Étape 1 : Détecter les paquets modifiés ───────────────────────────────
  detect-changes:
    name: Détecter les paquets modifiés
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # besoin du commit précédent pour le diff

      - name: Détecter les paquets changés
        id: detect
        run: |
          # Si un paquet est forcé via workflow_dispatch
          if [[ -n "${{ github.event.inputs.package }}" ]]; then
            PKG="${{ github.event.inputs.package }}"
            if [[ ! -d "packages/$PKG" ]]; then
              echo "❌ Le paquet '$PKG' n'existe pas dans packages/"
              exit 1
            fi
            PKGS_JSON=$(echo "$PKG" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # Détecter les dossiers modifiés sous packages/
            # Gestion du premier commit (pas de HEAD~1)
            if git rev-parse HEAD~1 &>/dev/null; then
              BASE="HEAD~1"
            else
              BASE="$(git hash-object -t tree /dev/null)"  # arbre vide
            fi

            # Le "|| true" empêche grep de tuer le script avec exit code 1
            # quand aucun fichier sous packages/ n'est modifié
            CHANGED_DIRS=$(git diff --name-only "$BASE" HEAD \
              | { grep '^packages/' || true; } \
              | awk -F/ '{print $2}' \
              | sort -u \
              | { grep -v '^$' || true; })

            if [[ -z "$CHANGED_DIRS" ]]; then
              echo "Aucun paquet modifié détecté."
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "packages=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            PKGS_JSON=$(echo "$CHANGED_DIRS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "Paquets à construire : $PKGS_JSON"
          echo "packages=$PKGS_JSON" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  # ─── Étape 2 : Build de chaque paquet en parallèle ─────────────────────────
  build:
    name: Build ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # continuer les autres paquets si l'un échoue
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier que le PKGBUILD existe
        run: |
          if [[ ! -f "packages/${{ matrix.package }}/PKGBUILD" ]]; then
            echo "❌ Pas de PKGBUILD trouvé dans packages/${{ matrix.package }}/"
            exit 1
          fi

      # QEMU permet d'exécuter des binaires aarch64 sur le runner x86_64
      - name: Configurer QEMU pour aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Builder ${{ matrix.package }}
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}/packages/${{ matrix.package }}:/workspace" \
            -w /workspace \
            ghcr.io/devducks/archlinuxarm:latest \
            bash -c '
              set -euo pipefail

              echo "==> Initialisation des clés pacman..."
              pacman-key --init
              pacman-key --populate archlinuxarm

              echo "==> Mise à jour du système..."
              pacman -Syu --noconfirm

              echo "==> Configuration locale..."
              sed -i "s/#en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/" /etc/locale.gen
              locale-gen
              export LC_ALL=en_US.UTF-8
              export LANG=en_US.UTF-8

              echo "==> Configuration pacman (SigLevel + dépôt custom)..."
              sed -i "/SigLevel/d" /etc/pacman.conf
              sed -i "/\[options\]/a SigLevel = Never" /etc/pacman.conf
              printf "\n[astromatto]\nServer = http://astroarch.astromatto.com:9000/\$arch\n" >> /etc/pacman.conf

              echo "==> Installation des dépendances de base..."
              pacman -Syu --noconfirm base-devel sudo libftdi libraw

              echo "==> Préparation de l utilisateur builder..."
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              chown -R builder:builder /workspace

              echo "==> Lancement du build makepkg..."
              cd /workspace
              sudo -u builder makepkg -s --noconfirm --nocheck --log

              echo "==> Build terminé !"
              ls -lh *.pkg.tar.* 2>/dev/null || echo "Aucun .pkg.tar.* trouvé"
            '

      - name: Lister les artefacts produits
        run: |
          echo "Paquets construits :"
          ls -lh packages/${{ matrix.package }}/*.pkg.tar.* 2>/dev/null \
            || echo "Aucun paquet trouvé — vérifier les logs ci-dessus."

      # Sauvegarde du paquet comme artefact GitHub (90 jours de rétention)
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-aarch64
          path: packages/${{ matrix.package }}/*.pkg.tar.*
          if-no-files-found: error
          retention-days: 90

  # ─── Étape 3 (optionnelle) : Déployer sur le dépôt pacman ──────────────────
  # Décommentez et configurez ce job si vous voulez pousser automatiquement
  # les paquets vers votre serveur astromatto.
