name: Build AArch64 Packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/PKGBUILD'
      - 'packages/**/*.install'
      - 'packages/**/*.patch'
      - 'packages/**/src/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'leave blank to detect automatically'
        required: false
        default: ''

jobs:
  # Detect modified packets
  detect-changes:
    name: Detect modified packets
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect modified packets
        id: detect
        run: |
          if [[ -n "${{ github.event.inputs.package }}" ]]; then
            PKG="${{ github.event.inputs.package }}"
            if [[ ! -d "packages/$PKG" ]]; then
              echo "❌ The package ‘$PKG’ does not exist in packages/"
              exit 1
            fi
            PKGS_JSON=$(echo "$PKG" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            if git rev-parse HEAD~1 &>/dev/null; then
              BASE="HEAD~1"
            else
              BASE="$(git hash-object -t tree /dev/null)"
            fi

            CHANGED_DIRS=$(git diff --name-only "$BASE" HEAD \
              | grep '^packages/' \
              | awk -F/ '{print $2}' \
              | sort -u \
              | grep -v '^$')

            if [[ -z "$CHANGED_DIRS" ]]; then
              echo "⚠️ No modified packages detected"
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "packages=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            PKGS_JSON=$(echo "$CHANGED_DIRS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "Packages to build : $PKGS_JSON"
          echo "packages=$PKGS_JSON" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  # Build each package in parallel
  build:
    name: Build ${{ matrix.package }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check that the PKGBUILD exists
        run: |
          if [[ ! -f "packages/${{ matrix.package }}/PKGBUILD" ]]; then
            echo "❌ No PKGBUILD found in packages/${{ matrix.package }}/"
            exit 1
          fi

      - name: Configure QEMU for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Builder ${{ matrix.package }}
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}/packages/${{ matrix.package }}:/workspace" \
            -w /workspace \
            ghcr.io/devducks/archlinuxarm:latest \
            bash -c '
              set -euo pipefail

              pacman-key --init
              pacman-key --populate archlinuxarm
              pacman -Syu --noconfirm
              sed -i "s/#en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/" /etc/locale.gen
              locale-gen
              export LC_ALL=en_US.UTF-8
              export LANG=en_US.UTF-8
              sed -i "/SigLevel/d" /etc/pacman.conf
              sed -i "/\[options\]/a SigLevel = Never" /etc/pacman.conf
              printf "\n[astromatto]\nServer = http://astroarch.astromatto.com:9000/\$arch\n" >> /etc/pacman.conf

              # Base system + the necessary library packages
              pacman -Syu --noconfirm base-devel sudo libftdi libraw

              # User Builder Setup
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              chown -R builder:builder /workspace

              # Build
              cd /workspace
              sudo -u builder makepkg -s --noconfirm --nocheck --log


              ls -lh *.pkg.tar.* 2>/dev/null || echo "No .pkg.tar.* files found"
            '

      - name: Lister les artefacts produits
        run: |
          echo "Built packages :"
          ls -lh packages/${{ matrix.package }}/*.pkg.tar.* 2>/dev/null \
            || echo "No package found — check the logs above"

      # Save the package as a GitHub artifact (14-day retention period)
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-aarch64
          path: packages/${{ matrix.package }}/*.pkg.tar.*
          if-no-files-found: error
          retention-days: 14

